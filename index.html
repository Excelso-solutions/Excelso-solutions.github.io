<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Excelso Solutions Portfolio</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

.project{
    margin-bottom:100px;
}

.gallery{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.gallery img{
    width:300px;
    border-radius:12px;
}

model-viewer{
    width:100%;
    height:600px;
    background:#222;
    border-radius:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Excelso Solutions Portfolio</h1>

<div class="project">

<h2>Project Name</h2>

<p>
Short project description.
</p>

<div class="gallery">
    <img src="images/render1.jpg">
    <img src="images/render2.jpg">
</div>

<model-viewer
src="models/project1.glb"
camera-controls
auto-rotate
shadow-intensity="1">
</model-viewer>

</div>

</div>

</body>
</html>
